<!-- events-page.component.html -->
<div class="px-4 pt-5 pb-5">
  <!-- ── Header ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-2">
      <div class="w-1 h-7 rounded-full bg-[#F04923]"></div>
      <div>
        <h1
          class="font-moul text-base text-neutral-800 dark:text-neutral-100 leading-loose overflow-visible"
        >
          ព្រឹត្តិការណ៍ជាតិ
        </h1>
        <p
          class="font-siemreap text-xs text-neutral-400 dark:text-neutral-500 leading-loose"
        >
          {{ totalEvents() }} ព្រឹត្តិការណ៍ក្នុងឆ្នាំ {{ selectedYear() }}
        </p>
      </div>
    </div>

    <!-- Year selector button — opens FilterModalComponent -->
    <button
      (click)="toggleYearModal()"
      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-siemreap text-sm font-medium bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-700 border border-neutral-200 dark:border-neutral-700 active:scale-95 transition-all duration-150"
      style="line-height: 1.8"
    >
      <ion-icon
        name="calendar-outline"
        class="text-[#F04923] text-base"
      ></ion-icon>
      <span>{{ selectedYear() }}</span>
      <ion-icon name="chevron-down-outline" class="text-xs"></ion-icon>
    </button>
  </div>

  <!-- ── Year Picker — reuses your FilterModalComponent ──────── -->
  <app-filter-modal
    [isOpen]="yearModalOpen()"
    title="ជ្រើសរើសឆ្នាំ"
    (closed)="yearModalOpen.set(false)"
  >
    <div class="sticky top-0 bg-white dark:bg-neutral-900 pb-3 z-10">
      <div class="relative">
        <ion-icon
          name="search-outline"
          class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-base pointer-events-none"
        ></ion-icon>
        <input
          type="text"
          placeholder="ស្វែងរកឆ្នាំ..."
          class="w-full pl-9 pr-4 py-2.5 rounded-xl font-siemreap border border-neutral-200 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-800 text-sm text-neutral-700 dark:text-neutral-200 placeholder:text-neutral-400 focus:outline-none transition"
          style="line-height: 1.8"
          [ngModel]="yearSearchQuery()"
          (ngModelChange)="yearSearchQuery.set($event)"
        />
      </div>
    </div>

    <!-- ✅ Add #yearList ref here -->
    <div
      #yearList
      class="space-y-1 max-h-[48vh] overflow-y-auto scroll-smooth pr-1"
    >
      <div
        *ngFor="let y of filteredYears()"
        [attr.data-year]="y"
        (click)="selectYear(y)"
        class="flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer select-none font-siemreap text-base border-b border-neutral-100 dark:border-neutral-800 transition-all duration-150"
        style="line-height: 1.8"
        [ngClass]="
          y === selectedYear()
            ? 'bg-[#F04923]/10 text-[#F04923] dark:text-[#FF7A52] font-semibold'
            : 'text-neutral-700 dark:text-neutral-300 hover:bg-[#F04923]/10 hover:text-[#F04923]'
        "
      >
        <span>{{ y }}</span>
        <ion-icon
          *ngIf="y === selectedYear()"
          name="checkmark-outline"
          class="text-[#F04923] dark:text-[#FF7A52] text-lg"
        ></ion-icon>
      </div>
    </div>
  </app-filter-modal>

  <!-- ── Filter Chips ───────────────────────────────────────── -->
  <div class="flex gap-2 mb-6 overflow-x-auto pb-1 hide-scrollbar">
    <button
      *ngFor="let f of filters"
      (click)="setFilter(f.value)"
      class="flex-shrink-0 flex items-center gap-1.5 font-siemreap text-xs px-3 py-1.5 rounded-full border transition-all duration-200 active:scale-95"
      style="line-height: 1.8"
      [ngClass]="
        activeFilter() === f.value
          ? f.activeClass
          : 'bg-white dark:bg-neutral-800 text-neutral-500 dark:text-neutral-400 border-neutral-200 dark:border-neutral-700'
      "
    >
      <span
        class="w-1.5 h-1.5 rounded-full flex-shrink-0"
        [ngClass]="f.dotClass"
      ></span>
      {{ f.label }}
    </button>
  </div>

  <!-- ── Month Groups ───────────────────────────────────────── -->
  <div class="space-y-7">
    <div *ngFor="let group of groupedEvents()">
      <!-- Month Header -->
      <div class="flex items-center gap-3 mb-3">
        <div class="flex items-center gap-2 flex-shrink-0">
          <span
            class="font-moul text-sm text-[#F04923] dark:text-[#FF7A52] leading-loose overflow-visible"
          >
            {{ group.khmerMonth }}
          </span>
          <span
            class="font-siemreap text-xs text-neutral-400 dark:text-neutral-500"
          >
            · {{ group.englishMonth }}
          </span>
        </div>
        <div class="flex-1 h-px bg-neutral-100 dark:bg-neutral-800"></div>
        <span
          *ngIf="group.events.length > 0"
          class="font-siemreap text-[11px] text-neutral-400 dark:text-neutral-600 flex-shrink-0"
          >{{ group.events.length }}</span
        >
      </div>

      <!-- Empty month placeholder -->
      <div
        *ngIf="group.events.length === 0"
        class="flex items-center gap-2 py-3 px-4 rounded-xl bg-neutral-50 dark:bg-neutral-800/50 border border-dashed border-neutral-200 dark:border-neutral-700"
      >
        <ion-icon
          name="calendar-outline"
          class="text-neutral-300 dark:text-neutral-600 text-lg flex-shrink-0"
        ></ion-icon>
        <span
          class="font-siemreap text-xs text-neutral-400 dark:text-neutral-500"
          style="line-height: 1.8"
        >
          គ្មានព្រឹត្តិការណ៍ក្នុងខែនេះ
        </span>
      </div>

      <!-- Event cards -->
      <div class="space-y-2" *ngIf="group.events.length > 0">
        <div
          *ngFor="let event of group.events"
          class="flex items-stretch rounded-xl overflow-hidden transition-all duration-200 hover:-translate-y-0.5 hover:shadow-md"
          [ngClass]="getCardClass(event)"
        >
          <!-- Left accent stripe -->
          <div
            class="w-1 flex-shrink-0"
            [ngClass]="getStripeClass(event)"
          ></div>

          <!-- Content -->
          <div class="flex-1 min-w-0 px-3 py-2.5">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <time
                  class="font-siemreap block text-[11px] leading-loose overflow-visible mb-0.5"
                  [ngClass]="getDateColor(event)"
                  >{{ formatEventDate(event) }}</time
                >

                <h3
                  class="font-moul text-sm leading-loose overflow-visible"
                  [ngClass]="getTitleColor(event)"
                >
                  {{ event.titleKh }}
                </h3>

                <p
                  class="font-siemreap text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 leading-relaxed"
                >
                  {{ event.titleEn }}
                </p>
              </div>

              <!-- Badge -->
              <span
                class="flex-shrink-0 font-siemreap text-[10px] px-2 py-0.5 rounded-full mt-1"
                style="line-height: 1.8"
                [ngClass]="getBadgeClass(event)"
                >{{ getBadgeLabel(event) }}</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
