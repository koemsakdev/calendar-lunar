<!-- tab1.page.html -->

<ion-header>
  <ion-toolbar>
    <ion-title>ប្រតិទិនកូនខ្មែរ</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div
    class="grid grid-cols-1 lg:grid-cols-2 md:grid-cols-2 gap-8 md:gap-4 p-4"
  >
    <!-- Calendar -->
    <div class="calendar-section">
      <app-calendar (dayClicked)="onDayClick($event)"></app-calendar>
    </div>

    <!-- Holidays sidebar -->
    <div class="sidebar-section">
      <app-holidays-list></app-holidays-list>
    </div>
  </div>

  <app-filter-modal
    [isOpen]="isModalOpen"
    title="ព័តមានលម្អិត"
    (closed)="closeModal()"
  >
    <ion-content class="bg-gray-50 dark:bg-neutral-900 space-y-8 relative z-10">
      <ng-container *ngIf="modalDetail">
        <!-- Header Section -->
        <div class="pt-2 pb-6 border-b border-gray-200 dark:border-neutral-700">
          <h4
            class="text-lg md:text-xl font-semibold text-gray-900 dark:text-white"
          >
            {{ getDateKhmerLunar(modalDetail.date) }}, ត្រូវនឹងថ្ងៃទី {{
            formatKhDate(modalDetail.date) }}
          </h4>

          <p class="text-blue-500 text-lg md:text-xl mt-4">
            {{ formatEnDate(modalDetail.date) }}
          </p>
        </div>

        <!-- Events List -->
        <div class="space-y-2">
          <div
            *ngFor="let attr of modalDetail.attributes"
            class="flex items-start gap-4 p-4 rounded-lg shadow-sm transition-all duration-200 hover:shadow-md"
            [ngClass]="
          isHoliday(attr)
            ? 'bg-red-50 dark:bg-red-900/20'
            : 'bg-blue-50 dark:bg-neutral-800'
        "
          >
            <!-- Icon -->
            <div
              class="flex items-center justify-center w-10 h-10 rounded-xl"
              [ngClass]="
            isHoliday(attr)
              ? 'bg-red-100 text-red-500'
              : 'bg-blue-100 text-blue-500'
          "
            >
              <ion-icon
                [name]="isHoliday(attr) ? 'flag-outline' : 'calendar-outline'"
                class="text-lg"
              ></ion-icon>
            </div>

            <!-- Text -->
            <div class="flex-1">
              <h5
                class="text-base font-semibold"
                [ngClass]="
              isHoliday(attr)
                ? 'text-red-500'
                : 'text-gray-900 dark:text-white'
            "
              >
                {{ getTitleKh(attr) }}
              </h5>
              <p
                class="text-sm"
                [ngClass]="
              isHoliday(attr)
                ? 'text-red-500'
                : 'text-gray-900 dark:text-white'
            "
              >
                {{ getTitleEn(attr) }}
              </p>
            </div>
          </div>

          <!-- Empty State -->
          <div
            *ngIf="!modalDetail.attributes?.length"
            class="flex flex-col items-center justify-center text-center py-10 text-gray-500 dark:text-gray-400"
          >
            <div
              class="w-16 h-16 rounded-full bg-gray-100 dark:bg-neutral-800 flex items-center justify-center mb-4"
            >
              <ion-icon name="calendar-outline" class="text-2xl"></ion-icon>
            </div>
            <p class="text-sm">No events on this day</p>
          </div>
        </div>

        <div
          *ngIf="isModalBuddhistHolyDay()"
          class="absolute -top-4 -right-4 opacity-[0.08] pointer-events-none"
        >
          <img
            src="assets/buddhist-icon.webp"
            class="w-full object-contain"
          />
        </div>
      </ng-container>
    </ion-content>
  </app-filter-modal>
</ion-content>
